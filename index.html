<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIVE! Transferências</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
  :root{
    --black:#0a0a0a;
    --black-2:#151515;
    --black-3:#1f1f1f;
    --yellow:#FFD400;
    --yellow-dim:#A88E00;
    --white:#f5f5f5;
    --gray:#8a8a8a;
    --green:#3ddc84;
    --red:#ff5c5c;
    --blue:#4da6ff;
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Segoe UI',Roboto,Arial,sans-serif;
    background:var(--black);
    color:var(--white);
    min-height:100vh;
    padding-bottom:40px;
  }
  header{
    background:var(--black-2);
    padding:18px 16px 14px;
    border-bottom:3px solid var(--yellow);
    position:sticky;
    top:0;
    z-index:10;
  }
  .logo-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:12px;
  }
  .logo{
    font-size:22px;
    font-weight:800;
    letter-spacing:0.5px;
  }
  .logo span{color:var(--yellow);}
  .subtitle{font-size:12px;color:var(--gray);margin-top:-2px;}
  select#storeSelect{
    background:var(--black-3);
    color:var(--white);
    border:1px solid #333;
    border-radius:10px;
    padding:10px 12px;
    font-size:14px;
    width:100%;
    font-weight:600;
  }
  .store-label{font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px;display:block;}
  nav{
    display:flex;
    gap:6px;
    margin-top:14px;
    overflow-x:auto;
  }
  nav button{
    flex:1;
    min-width:84px;
    background:var(--black-3);
    color:var(--gray);
    border:none;
    border-radius:10px;
    padding:10px 6px;
    font-size:12px;
    font-weight:700;
    cursor:pointer;
    transition:.15s;
    white-space:nowrap;
  }
  nav button.active{
    background:var(--yellow);
    color:var(--black);
  }
  nav button .badge{
    display:inline-block;
    background:var(--red);
    color:white;
    border-radius:50%;
    width:16px;height:16px;
    font-size:10px;
    line-height:16px;
    margin-left:4px;
  }
  main{padding:18px 16px;max-width:560px;margin:0 auto;}
  .card{
    background:var(--black-2);
    border-radius:var(--radius);
    padding:18px;
    margin-bottom:14px;
    border:1px solid #262626;
  }
  .card h2{font-size:15px;margin-bottom:14px;color:var(--yellow);}
  label{font-size:12px;color:var(--gray);display:block;margin-bottom:5px;margin-top:12px;}
  label:first-of-type{margin-top:0;}
  input, select, textarea{
    width:100%;
    background:var(--black-3);
    color:var(--white);
    border:1px solid #333;
    border-radius:10px;
    padding:11px 12px;
    font-size:14px;
  }
  input:focus, select:focus{outline:none;border-color:var(--yellow);}
  .row2{display:flex;gap:10px;}
  .row2 > div{flex:1;}
  button.primary{
    width:100%;
    background:var(--yellow);
    color:var(--black);
    border:none;
    border-radius:10px;
    padding:13px;
    font-size:14px;
    font-weight:800;
    margin-top:16px;
    cursor:pointer;
    transition:.15s;
  }
  button.primary:active{transform:scale(0.98);}
  button.primary:disabled{opacity:0.5;}
  .transfer-item{
    background:var(--black-3);
    border-radius:12px;
    padding:13px 14px;
    margin-bottom:10px;
    border-left:4px solid var(--gray);
  }
  .transfer-item.pendente{border-left-color:var(--yellow);}
  .transfer-item.recebido{border-left-color:var(--blue);}
  .transfer-item.ajustado{border-left-color:var(--green);}
  .ti-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .ti-piece{font-weight:700;font-size:14px;}
  .ti-qty{color:var(--yellow);font-weight:700;font-size:13px;white-space:nowrap;}
  .ti-route{font-size:12px;color:var(--gray);margin-top:4px;}
  .ti-route b{color:var(--white);}
  .ti-meta{font-size:11px;color:#666;margin-top:6px;}
  .status-pill{
    display:inline-block;
    font-size:10px;
    font-weight:700;
    padding:3px 9px;
    border-radius:20px;
    text-transform:uppercase;
    letter-spacing:0.3px;
    margin-top:8px;
  }
  .status-pill.pendente{background:rgba(255,212,0,0.15);color:var(--yellow);}
  .status-pill.recebido{background:rgba(77,166,255,0.15);color:var(--blue);}
  .status-pill.ajustado{background:rgba(61,220,132,0.15);color:var(--green);}
  .ti-actions{margin-top:10px;display:flex;gap:8px;}
  .ti-actions button{
    flex:1;
    border:none;
    border-radius:8px;
    padding:9px;
    font-size:12px;
    font-weight:700;
    cursor:pointer;
  }
  .btn-receive{background:var(--blue);color:#03101c;}
  .btn-adjust{background:var(--green);color:#03150c;}
  .empty-state{
    text-align:center;
    color:var(--gray);
    padding:40px 20px;
    font-size:13px;
  }
  .filter-row{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;}
  .filter-chip{
    background:var(--black-3);
    color:var(--gray);
    border:1px solid #333;
    border-radius:20px;
    padding:6px 13px;
    font-size:11px;
    font-weight:600;
    white-space:nowrap;
    cursor:pointer;
  }
  .filter-chip.active{background:var(--yellow);color:var(--black);border-color:var(--yellow);}
  .summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .summary-card{
    background:var(--black-3);
    border-radius:12px;
    padding:14px;
  }
  .summary-card .store-name{font-size:12px;font-weight:700;margin-bottom:8px;}
  .summary-stat{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;color:var(--gray);}
  .summary-stat b{color:var(--white);}
  .summary-saldo{
    margin-top:8px;
    padding-top:8px;
    border-top:1px solid #333;
    font-size:13px;
    font-weight:800;
    display:flex;
    justify-content:space-between;
  }
  .saldo-pos{color:var(--green);}
  .saldo-neg{color:var(--red);}
  .toast{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:var(--yellow);
    color:var(--black);
    padding:12px 22px;
    border-radius:30px;
    font-size:13px;
    font-weight:700;
    box-shadow:0 4px 20px rgba(0,0,0,0.4);
    z-index:100;
    opacity:0;
    transition:.25s;
    pointer-events:none;
  }
  .toast.show{opacity:1;}
  .loading{text-align:center;padding:30px;color:var(--gray);font-size:13px;}
  .manager-toggle{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:12px;
    color:var(--gray);
    margin-top:12px;
    cursor:pointer;
  }
  .manager-toggle input{width:auto;}
</style>
</head>
<body>

<header>
  <div class="logo-row">
    <div>
      <div class="logo">LIVE! <span>Transferências</span></div>
      <div class="subtitle">Controle de peças entre lojas</div>
    </div>
  </div>
  <span class="store-label">Você está em:</span>
  <select id="storeSelect"></select>
  <nav id="navTabs">
    <button data-tab="nova" class="active">Nova</button>
    <button data-tab="confirmacoes">Confirmar <span class="badge" id="badgeCount" style="display:none;">0</span></button>
    <button data-tab="historico">Histórico</button>
    <button data-tab="resumo">Resumo</button>
  </nav>
</header>

<main>

  <!-- NOVA TRANSFERÊNCIA -->
  <section id="tab-nova" class="tab-content">
    <div class="card">
      <h2>📦 Registrar transferência</h2>
      <label>Peça (nome ou código)</label>
      <input type="text" id="fPiece" placeholder="Ex: Bermuda jeans cód. 4521">
      <label>Quantidade</label>
      <input type="number" id="fQty" min="1" value="1">
      <div class="row2">
        <div>
          <label>Loja de origem</label>
          <select id="fOrigin"></select>
        </div>
        <div>
          <label>Loja de destino</label>
          <select id="fDestination"></select>
        </div>
      </div>
      <button class="primary" id="btnSubmit">Registrar transferência</button>
    </div>
  </section>

  <!-- CONFIRMAÇÕES -->
  <section id="tab-confirmacoes" class="tab-content" style="display:none;">
    <label class="manager-toggle">
      <input type="checkbox" id="managerMode">
      Sou gerente — mostrar confirmações de ajuste no Cigam
    </label>
    <div id="confirmList" style="margin-top:14px;"></div>
  </section>

  <!-- HISTÓRICO -->
  <section id="tab-historico" class="tab-content" style="display:none;">
    <div class="filter-row" id="historyFilters"></div>
    <div id="historyList"></div>
  </section>

  <!-- RESUMO -->
  <section id="tab-resumo" class="tab-content" style="display:none;">
    <div id="summaryContent" class="loading">Carregando...</div>
  </section>

</main>

<div class="toast" id="toast"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB9LxMVbD6opFjrp5Q1icRmVeOg2M_8aJM",
  authDomain: "live-ponto.firebaseapp.com",
  databaseURL: "https://live-ponto-default-rtdb.firebaseio.com",
  projectId: "live-ponto",
  storageBucket: "live-ponto.firebasestorage.app",
  messagingSenderId: "202677095216",
  appId: "1:202677095216:web:0ed9520cf913c72195d6f5"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const REF_PATH = "transferencias_pecas";

const STORES = [
  "Praiamar Shopping",
  "Miramar Shopping",
  "Azevedo Sodré",
  "Litoral Plaza (Praia Grande)",
  "Bioritmo/LSBIO"
];

let allTransfers = [];
let currentStore = localStorage.getItem("lv_transf_store") || STORES[0];
let historyFilter = "todas";

// ---------- INIT SELECTS ----------
function fillStoreSelects(){
  const selects = [document.getElementById("storeSelect"), document.getElementById("fOrigin"), document.getElementById("fDestination")];
  selects.forEach(sel=>{
    sel.innerHTML = STORES.map(s=>`<option value="${s}">${s}</option>`).join("");
  });
  document.getElementById("storeSelect").value = currentStore;
  document.getElementById("fOrigin").value = currentStore;
}
fillStoreSelects();

document.getElementById("storeSelect").addEventListener("change", e=>{
  currentStore = e.target.value;
  localStorage.setItem("lv_transf_store", currentStore);
  document.getElementById("fOrigin").value = currentStore;
  renderAll();
});

// ---------- TABS ----------
document.querySelectorAll("#navTabs button").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    document.querySelectorAll("#navTabs button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    document.querySelectorAll(".tab-content").forEach(t=>t.style.display="none");
    document.getElementById("tab-"+btn.dataset.tab).style.display="block";
    renderAll();
  });
});

document.getElementById("managerMode").addEventListener("change", renderConfirmacoes);

// ---------- TOAST ----------
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2200);
}

// ---------- SUBMIT NEW TRANSFER ----------
document.getElementById("btnSubmit").addEventListener("click", async ()=>{
  const piece = document.getElementById("fPiece").value.trim();
  const qty = parseInt(document.getElementById("fQty").value);
  const origin = document.getElementById("fOrigin").value;
  const destination = document.getElementById("fDestination").value;

  if(!piece){ toast("Digite o nome/código da peça"); return; }
  if(!qty || qty < 1){ toast("Quantidade inválida"); return; }
  if(origin === destination){ toast("Origem e destino não podem ser iguais"); return; }

  const btn = document.getElementById("btnSubmit");
  btn.disabled = true;
  btn.textContent = "Registrando...";

  try{
    await db.ref(REF_PATH).push({
      pieceName: piece,
      quantity: qty,
      origin: origin,
      destination: destination,
      status: "pendente",
      createdAt: firebase.database.ServerValue.TIMESTAMP,
      receivedAt: null,
      adjustedAt: null
    });
    document.getElementById("fPiece").value = "";
    document.getElementById("fQty").value = 1;
    toast("Transferência registrada! ✅");
  }catch(err){
    console.error(err);
    toast("Erro ao registrar. Tente novamente.");
  }
  btn.disabled = false;
  btn.textContent = "Registrar transferência";
});

// ---------- FIRESTORE LISTENER ----------
db.ref(REF_PATH).on("value", snap=>{
  const data = snap.val() || {};
  allTransfers = Object.keys(data).map(id=>({id, ...data[id]}))
    .sort((a,b)=> (b.createdAt||0) - (a.createdAt||0));
  renderAll();
}, err=>{
  console.error(err);
  document.getElementById("confirmList").innerHTML = `<div class="empty-state">Erro ao carregar dados.<br>${err.message}</div>`;
});

function renderAll(){
  renderConfirmacoes();
  renderHistorico();
  renderResumo();
}

function fmtDate(ts){
  if(!ts) return "—";
  const d = new Date(ts);
  return d.toLocaleString("pt-BR", {day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});
}

// ---------- CONFIRMAÇÕES ----------
function renderConfirmacoes(){
  const managerMode = document.getElementById("managerMode").checked;
  const container = document.getElementById("confirmList");

  let pending;
  if(managerMode){
    pending = allTransfers.filter(t=>t.status === "recebido");
  } else {
    pending = allTransfers.filter(t=>t.status === "pendente" && t.destination === currentStore);
  }

  const badge = document.getElementById("badgeCount");
  const totalBadge = allTransfers.filter(t=> managerMode ? t.status==="recebido" : (t.status==="pendente" && t.destination===currentStore)).length;
  if(totalBadge > 0){
    badge.style.display = "inline-block";
    badge.textContent = totalBadge;
  } else {
    badge.style.display = "none";
  }

  if(pending.length === 0){
    container.innerHTML = `<div class="empty-state">${managerMode ? "Nenhuma transferência aguardando ajuste no Cigam." : "Nenhuma transferência pendente de recebimento em "+currentStore+"."}</div>`;
    return;
  }

  container.innerHTML = pending.map(t=>`
    <div class="transfer-item ${t.status}">
      <div class="ti-top">
        <div class="ti-piece">${escapeHtml(t.pieceName)}</div>
        <div class="ti-qty">x${t.quantity}</div>
      </div>
      <div class="ti-route"><b>${t.origin}</b> → <b>${t.destination}</b></div>
      <div class="ti-meta">Registrado em ${fmtDate(t.createdAt)}${t.receivedAt ? " · Recebido em "+fmtDate(t.receivedAt) : ""}</div>
      <span class="status-pill ${t.status}">${t.status}</span>
      <div class="ti-actions">
        ${managerMode
          ? `<button class="btn-adjust" onclick="confirmAdjust('${t.id}')">✔ Confirmar ajuste no Cigam</button>`
          : `<button class="btn-receive" onclick="confirmReceive('${t.id}')">✔ Confirmar recebimento</button>`
        }
      </div>
    </div>
  `).join("");
}

async function confirmReceive(id){
  try{
    await db.ref(REF_PATH + "/" + id).update({
      status: "recebido",
      receivedAt: firebase.database.ServerValue.TIMESTAMP
    });
    toast("Recebimento confirmado! 📥");
  }catch(err){
    console.error(err);
    toast("Erro ao confirmar.");
  }
}

async function confirmAdjust(id){
  try{
    await db.ref(REF_PATH + "/" + id).update({
      status: "ajustado",
      adjustedAt: firebase.database.ServerValue.TIMESTAMP
    });
    toast("Ajuste no Cigam confirmado! ✅");
  }catch(err){
    console.error(err);
    toast("Erro ao confirmar.");
  }
}

// ---------- HISTÓRICO ----------
function renderHistoryFilters(){
  const filters = ["todas","pendente","recebido","ajustado"];
  const labels = {todas:"Todas", pendente:"Pendentes", recebido:"Recebidas", ajustado:"Ajustadas"};
  const container = document.getElementById("historyFilters");
  container.innerHTML = filters.map(f=>`
    <div class="filter-chip ${f===historyFilter?'active':''}" onclick="setHistoryFilter('${f}')">${labels[f]}</div>
  `).join("");
}
function setHistoryFilter(f){
  historyFilter = f;
  renderHistorico();
}

function renderHistorico(){
  renderHistoryFilters();
  const container = document.getElementById("historyList");
  let list = allTransfers;
  if(historyFilter !== "todas"){
    list = list.filter(t=>t.status === historyFilter);
  }
  if(list.length === 0){
    container.innerHTML = `<div class="empty-state">Nenhuma transferência encontrada.</div>`;
    return;
  }
  container.innerHTML = list.map(t=>`
    <div class="transfer-item ${t.status}">
      <div class="ti-top">
        <div class="ti-piece">${escapeHtml(t.pieceName)}</div>
        <div class="ti-qty">x${t.quantity}</div>
      </div>
      <div class="ti-route"><b>${t.origin}</b> → <b>${t.destination}</b></div>
      <div class="ti-meta">
        Registrado: ${fmtDate(t.createdAt)}
        ${t.receivedAt ? "<br>Recebido: "+fmtDate(t.receivedAt) : ""}
        ${t.adjustedAt ? "<br>Ajustado no Cigam: "+fmtDate(t.adjustedAt) : ""}
      </div>
      <span class="status-pill ${t.status}">${t.status}</span>
    </div>
  `).join("");
}

// ---------- RESUMO ----------
function renderResumo(){
  const container = document.getElementById("summaryContent");
  const stats = {};
  STORES.forEach(s=> stats[s] = {enviadas:0, recebidas:0, qtyOut:0, qtyIn:0});

  allTransfers.forEach(t=>{
    if(stats[t.origin]){
      stats[t.origin].enviadas++;
      stats[t.origin].qtyOut += (t.quantity||0);
    }
    if(stats[t.destination]){
      stats[t.destination].recebidas++;
      stats[t.destination].qtyIn += (t.quantity||0);
    }
  });

  container.className = "summary-grid";
  container.innerHTML = STORES.map(s=>{
    const st = stats[s];
    const saldo = st.qtyIn - st.qtyOut;
    const saldoClass = saldo > 0 ? "saldo-pos" : (saldo < 0 ? "saldo-neg" : "");
    const saldoSign = saldo > 0 ? "+" : "";
    return `
      <div class="summary-card">
        <div class="store-name">${s}</div>
        <div class="summary-stat"><span>Enviadas</span><b>${st.enviadas} (${st.qtyOut} pç)</b></div>
        <div class="summary-stat"><span>Recebidas</span><b>${st.recebidas} (${st.qtyIn} pç)</b></div>
        <div class="summary-saldo">
          <span>Saldo</span>
          <span class="${saldoClass}">${saldoSign}${saldo} pç</span>
        </div>
      </div>
    `;
  }).join("");
}

function escapeHtml(str){
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}
</script>
</body>
</html>
